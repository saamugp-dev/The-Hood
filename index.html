<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE HOOD · Premium Streetwear & Sneakers</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Variables de Diseño Hypebeast Hacia el Futuro ── */
    :root {
      --bg-black:   #000000;
      --bg-dark:    #0A0A0A;
      --card-bg:    #111111;
      --border-color:#1E1E1E;
      --accent:     #FF0000; /* Rojo Supreme/Hype */
      --text-white: #FFFFFF;
      --text-gray:  #8E8E93;
      --font-urban: 'Space Grotesk', sans-serif;
      --font-body:  'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-body); color: var(--text-white); background: var(--bg-black); overflow-x: hidden; }

    /* ── Barra de Navegación Minimalista Superior ── */
    .navbar {
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      padding: 1.1rem 0;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
    }
    .navbar-brand {
      font-family: var(--font-urban);
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.04em;
      color: var(--text-white) !important;
      text-transform: uppercase;
    }
    .navbar-brand span {
      background: var(--accent);
      color: #fff;
      padding: 0.1rem 0.4rem;
      margin-left: 0.2rem;
      font-weight: 700;
    }
    .nav-link {
      color: var(--text-gray) !important;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      transition: color 0.2s;
    }
    .nav-link:hover, .nav-link.active { color: var(--text-white) !important; }
    
    .cart-icon-btn {
      position: relative;
      background: transparent;
      border: none;
      color: var(--text-white);
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
    }
    .cart-badge {
      position: absolute;
      top: -6px;
      right: -8px;
      background: var(--text-white);
      color: #000;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.35rem;
      border-radius: 50%;
      font-family: var(--font-urban);
    }
